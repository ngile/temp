---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-app
  labels:
    app: simple-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simple-app
  template:
    metadata:
      labels:
        app: simple-app
    spec:
      containers:
        - name: simple-app
          image: ngile/simple-app:latest
          envFrom:
            - secretRef:
                name: simple-app-secret
            - configMapRef:
                name: simple-app-config
          ports:
            - containerPort: 8000
          resources:
            limits:
              memory: "128Mi"
              cpu: "100m"
            requests:
              memory: "64Mi"
              cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: simple-app
spec:
  type: ClusterIP
  selector:
    app: simple-app
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: simple-app-config
data:
  CURRENT_CITY: "Karlovo"
